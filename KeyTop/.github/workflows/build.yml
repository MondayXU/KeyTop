name: Build KeyTop

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW
      uses: msys2/setup-msys2@v2
      with:
        install: mingw-w64-x86_64-gcc mingw-w64-x86_64-make

    - name: Build
      shell: msys2 {0}
      run: |
        cd build
        make

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: v1.0.0 - Initial Release
        body: |
          # KeyTop v1.0.0

          轻量级 Windows 键盘快捷键重映射和窗口管理工具。

          ## 功能
          - 键盘重映射（单键、组合键、双向交换）
          - 窗口置顶和穿透
          - 多种操作方式（快捷键、鼠标中键、托盘菜单）

          ## 系统要求
          - Windows 10/11
          - 无需额外依赖
        files: build/KeyTop.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
